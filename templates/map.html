<!DOCTYPE html>
<html>

<head>

<title>Water Pollution Heatmap</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
}

#map{
height:500px;
width:90%;
margin:auto;
}

</style>

</head>

<body>

<h2>Live Water Pollution Heatmap</h2>

<div id="map"></div>

<script>

var map = L.map('map').setView([20.5937,78.9629],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)

fetch("/pollution-data")
.then(r=>r.json())
.then(data=>{

var heat = L.heatLayer(data,{
radius:25,
blur:15,
maxZoom:10
})

heat.addTo(map)

})

</script>

</body>

</html>
