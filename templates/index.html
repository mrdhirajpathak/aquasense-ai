<!DOCTYPE html>
<html>
<head>

<title>AquaSense AI</title>

<link rel="stylesheet" href="/static/style.css">

<script src="/static/script.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<h1>AquaSense AI - Water Intelligence Platform</h1>

<div class="container">

<h2>AI Water Chatbot</h2>

<input id="question" placeholder="Ask about water safety or conservation">

<button onclick="askAI()">Ask AI</button>
<button onclick="startVoice()">🎤 Voice</button>

<p id="response"></p>

</div>

<hr>

<div class="container">

<h2>Upload Water Image (Pollution Detection)</h2>

<input type="file" id="imageInput">

<button onclick="uploadImage()">Detect Pollution</button>

<p id="imageResult"></p>

</div>

<hr>

<div class="container">

<h2>Rainwater Harvesting Prediction</h2>

<input id="city" placeholder="Enter City">

<input id="area" placeholder="Roof Area (sq meters)">

<button onclick="predictRainwater()">Predict</button>

<p id="rainResult"></p>

</div>

<hr>

<div class="container">

<h2>Water Usage Calculator</h2>

<input id="people" placeholder="Number of People">

<input id="showers" placeholder="Showers per day">

<input id="laundry" placeholder="Laundry loads">

<button onclick="calcWater()">Calculate</button>

<p id="waterResult"></p>

</div>

<hr>

<div class="container">

<h2>Water Pollution Map</h2>

<a href="/map">Open Live Pollution Heatmap</a>

</div>

<script>

function askAI(){

let q=document.getElementById("question").value

fetch("/ask",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({question:q})

})
.then(r=>r.json())
.then(data=>{
document.getElementById("response").innerText=data.answer
})

}

function startVoice(){

const recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.start()

recognition.onresult=function(event){

document.getElementById("question").value=
event.results[0][0].transcript

}

}

function uploadImage(){

let file=document.getElementById("imageInput").files[0]

let formData=new FormData()

formData.append("image",file)

fetch("/upload",{

method:"POST",
body:formData

})
.then(r=>r.json())
.then(data=>{
document.getElementById("imageResult").innerText=data.result
})

}

function predictRainwater(){

let city=document.getElementById("city").value
let area=document.getElementById("area").value

fetch("/rainwater",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({city:city,area:area})

})
.then(r=>r.json())
.then(data=>{
document.getElementById("rainResult").innerText=
"Rainfall: "+data.rainfall_mm+
" mm | Collectable Water: "+data.water_collectable+
" L | "+data.recommendation
})

}

function calcWater(){

let people=document.getElementById("people").value
let showers=document.getElementById("showers").value
let laundry=document.getElementById("laundry").value

fetch("/water-usage",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
people:people,
showers:showers,
laundry:laundry
})

})
.then(r=>r.json())
.then(data=>{
document.getElementById("waterResult").innerText=
"Daily usage: "+data.daily_usage_liters+
"L | Monthly: "+data.monthly_usage_liters+"L"
})

}

</script>

</body>
</html>
